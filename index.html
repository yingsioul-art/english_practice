<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>萬用主題語塊練習 App</title>
  
  <!-- 載入 React 核心 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel 讓瀏覽器可以讀取 React 的 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 載入 Tailwind CSS 進行排版與美化 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
    body { background-color: #f8fafc; } /* slate-50 */
  </style>
</head>
<body>
  <!-- React App 將會渲染在這裡 -->
  <div id="root"></div>

  <!-- App 核心邏輯 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 內建 SVG 圖示元件
    const Icon = ({ name, size = 24, className = "" }) => {
      const svgProps = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className };
      switch (name) {
        case 'Volume2': return <svg {...svgProps}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
        case 'Mic': return <svg {...svgProps}><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>;
        case 'ArrowRight': return <svg {...svgProps}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        case 'ArrowLeft': return <svg {...svgProps}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        case 'RefreshCw': return <svg {...svgProps}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        case 'BookOpen': return <svg {...svgProps}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        case 'Edit3': return <svg {...svgProps}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
        case 'Headphones': return <svg {...svgProps}><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>;
        case 'MessageCircle': return <svg {...svgProps}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>;
        case 'Check': return <svg {...svgProps}><polyline points="20 6 9 17 4 12"></polyline></svg>;
        case 'X': return <svg {...svgProps}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        case 'PlayCircle': return <svg {...svgProps}><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>;
        case 'AlertCircle': return <svg {...svgProps}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        case 'List': return <svg {...svgProps}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
        case 'BrainCircuit': return <svg {...svgProps}><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"></path><path d="M16 8V5c0-1.1.9-2 2-2"></path><path d="M12 13h4"></path><path d="M12 17h6"></path><path d="M19 13v4"></path><path d="M22 13h-3"></path><path d="M19 17v4"></path><path d="M22 8h-3"></path><circle cx="19" cy="8" r="1"></circle><circle cx="19" cy="13" r="1"></circle><circle cx="19" cy="17" r="1"></circle></svg>;
        case 'Frown': return <svg {...svgProps}><circle cx="12" cy="12" r="10"></circle><path d="M16 16s-1.5-2-4-2-4 2-4 2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>;
        case 'Meh': return <svg {...svgProps}><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="15" x2="16" y2="15"></line><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>;
        case 'Smile': return <svg {...svgProps}><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>;
        case 'Zap': return <svg {...svgProps}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        case 'BarChart2': return <svg {...svgProps}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
        case 'Award': return <svg {...svgProps}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;
        default: return null;
      }
    };

    // 例句產生器
    const generateExamples = (en, zh) => {
      const examplesMap = {
        "daily routines and habits": [{ text: "I am trying to improve my daily routines and habits.", translation: "我正在試著改善我的日常作息與習慣。" }],
        "working from home": [{ text: "Working from home gives me more flexibility.", translation: "居家辦公給我更多彈性。" }]
      };
      if (examplesMap[en]) return examplesMap[en];
      return [
        { text: `I recently read an article about ${en}.`, translation: `我最近讀了一篇關於「${zh}」的文章。` },
        { text: `How do you usually handle ${en}?`, translation: `你通常怎麼處理「${zh}」？` }
      ];
    };

    // 精簡版資料庫示範 (保留所有類別)
    const rawDB = [
      { en: "daily routines and habits", zh: "日常作息與習慣", category: "日常作息與生活方式" },
      { en: "building better habits", zh: "建立好習慣", category: "日常作息與生活方式" },
      { en: "meal prepping", zh: "自己備餐的習慣", category: "日常作息與生活方式" },
      { en: "eating out versus cooking at home", zh: "外食跟在家煮", category: "飲食相關" },
      { en: "comfort food", zh: "感到療癒的食物", category: "飲食相關" },
      { en: "experiencing culture shock", zh: "經歷文化衝擊", category: "旅行與文化" },
      { en: "traveling solo", zh: "獨旅", category: "旅行與文化" },
      { en: "cutting down screen time", zh: "減少螢幕時間", category: "科技與媒體" },
      { en: "using AI tools", zh: "使用AI 工具", category: "科技與媒體" },
      { en: "drinking bubble tea", zh: "喝珍奶", category: "台灣飲食文化" },
      { en: "riding a scooter in Taiwan", zh: "在台灣騎機車", category: "台灣日常生活" },
      { en: "investing in stocks", zh: "投資股票", category: "金錢、投資、財務生活" },
      { en: "hitting the gym", zh: "上健身房", category: "健康、運動" },
      { en: "learning English consistently", zh: "穩定持續地學英文", category: "工作、學習、溝通" },
      { en: "preparing for a job interview", zh: "準備面試", category: "職場動態性與職涯" },
      { en: "working from home", zh: "居家辦公", category: "職場動態性與職涯" }
    ];

    const vocabularyDB = rawDB.map(item => ({ ...item, examples: generateExamples(item.en, item.zh) }));
    const allCategories = [...new Set(vocabularyDB.map(item => item.category))];
    const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

    function App() {
      const [mode, setMode] = useState('menu'); 
      const [selectedCategory, setSelectedCategory] = useState('All');
      const [filteredDB, setFilteredDB] = useState(vocabularyDB);
      
      // Flashcard States
      const [fcQueue, setFcQueue] = useState([]);
      const [fcTotalCards, setFcTotalCards] = useState(0);
      const [fcStats, setFcStats] = useState({ again: 0, hard: 0, good: 0, easy: 0 });
      const [isFlipped, setIsFlipped] = useState(false);
      const [currentExample, setCurrentExample] = useState(null);

      // Listening Test States
      const [listenQueue, setListenQueue] = useState([]);
      const [listenIndex, setListenIndex] = useState(0);
      const [listenWrongQueue, setListenWrongQueue] = useState([]);
      const [listenCorrectCount, setListenCorrectCount] = useState(0);
      const [listenRound, setListenRound] = useState(1);
      const [showListenSummary, setShowListenSummary] = useState(false);
      const [isListenAnswered, setIsListenAnswered] = useState(false);
      const [listeningOptions, setListeningOptions] = useState([]);
      const [listenFeedback, setListenFeedback] = useState(null);

      // Other Modes
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userInput, setUserInput] = useState('');
      const [spellFeedback, setSpellFeedback] = useState(null);
      const [isRecording, setIsRecording] = useState(false);
      const [speakFeedback, setSpeakFeedback] = useState(null);

      const playAudio = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US';
          utterance.rate = 0.85; 
          window.speechSynthesis.speak(utterance);
        }
      };

      useEffect(() => {
        let newDB = selectedCategory === 'All' ? vocabularyDB : vocabularyDB.filter(item => item.category === selectedCategory);
        setFilteredDB(newDB);
        setCurrentIndex(0);
        
        const initialFcQueue = shuffle([...newDB]);
        setFcQueue(initialFcQueue);
        setFcTotalCards(initialFcQueue.length);
        setFcStats({ again: 0, hard: 0, good: 0, easy: 0 });
        setIsFlipped(false);

        const initialListenQueue = shuffle([...newDB]);
        setListenQueue(initialListenQueue);
        setListenIndex(0);
        setListenWrongQueue([]);
        setListenCorrectCount(0);
        setListenRound(1);
        setShowListenSummary(false);
        setIsListenAnswered(false);
      }, [selectedCategory]);

      useEffect(() => {
        if (mode === 'flashcard' && !isFlipped && fcQueue.length > 0) playAudio(fcQueue[0].en);
      }, [fcQueue, isFlipped, mode]);

      const handleFlashcardFlip = () => {
        if (fcQueue.length === 0) return;
        if (!isFlipped) {
          const currentItem = fcQueue[0];
          const randomExample = currentItem.examples[Math.floor(Math.random() * currentItem.examples.length)];
          setCurrentExample(randomExample);
          setIsFlipped(true);
          playAudio(randomExample.text); 
        } else {
          setIsFlipped(false);
          playAudio(fcQueue[0].en); 
        }
      };

      const handleSrsClick = (e, type) => {
        e.stopPropagation(); 
        setFcStats(prev => ({ ...prev, [type]: prev[type] + 1 }));
        let newQueue = [...fcQueue];
        const currentCard = newQueue.shift(); 
        if (type === 'again') newQueue.splice(1, 0, currentCard);
        else if (type === 'hard') newQueue.splice(Math.floor(newQueue.length / 2), 0, currentCard);
        else if (type === 'good') newQueue.push(currentCard);
        setFcQueue(newQueue);
        setIsFlipped(false);
      };

      // Listening Logic
      useEffect(() => {
        if (mode === 'listening' && listenQueue.length > 0 && !showListenSummary) {
          const currentWord = listenQueue[listenIndex];
          let otherWords = filteredDB.filter(w => w.en !== currentWord.en);
          if (otherWords.length < 3) otherWords = vocabularyDB.filter(w => w.en !== currentWord.en);
          const options = shuffle([currentWord, ...shuffle(otherWords).slice(0, 3)]);
          setListeningOptions(options);
          setListenFeedback(null);
          setIsListenAnswered(false);
          setTimeout(() => playAudio(currentWord.en), 500);
        }
      }, [listenIndex, listenQueue, mode, showListenSummary, filteredDB]);

      const handleListenSelect = (selectedZh) => {
        if (isListenAnswered) return;
        setIsListenAnswered(true);
        const currentWord = listenQueue[listenIndex];
        if (selectedZh === currentWord.zh) {
          setListenFeedback({ type: 'success', text: '正確！' });
          setListenCorrectCount(prev => prev + 1);
        } else {
          setListenFeedback({ type: 'error', text: `答錯囉，正確答案是: ${currentWord.zh}` });
          setListenWrongQueue(prev => [...prev, currentWord]);
        }
      };

      const handleListenNext = () => {
        if (listenIndex + 1 < listenQueue.length) setListenIndex(prev => prev + 1);
        else setShowListenSummary(true);
      };

      const startNextListenRound = () => {
        setListenQueue(shuffle([...listenWrongQueue]));
        setListenIndex(0);
        setListenWrongQueue([]);
        setListenCorrectCount(0);
        setListenRound(prev => prev + 1);
        setShowListenSummary(false);
        setIsListenAnswered(false);
      };

      // General Logic
      const nextWord = () => { setUserInput(''); setSpellFeedback(null); setSpeakFeedback(null); setCurrentIndex((prev) => (prev + 1) % filteredDB.length); };
      const prevWord = () => { setUserInput(''); setSpellFeedback(null); setSpeakFeedback(null); setCurrentIndex((prev) => (prev - 1 + filteredDB.length) % filteredDB.length); };

      const checkSpelling = () => {
        const currentWordStr = filteredDB[currentIndex].en.toLowerCase().replace(/[^\w\s]/g, '').trim();
        const inputStr = userInput.toLowerCase().replace(/[^\w\s]/g, '').trim();
        if (inputStr === currentWordStr) { setSpellFeedback({ type: 'success', text: '太棒了！拼寫完全正確！' }); playAudio(filteredDB[currentIndex].en); }
        else setSpellFeedback({ type: 'error', text: `正確答案是: ${filteredDB[currentIndex].en}` });
      };

      const handleSpeak = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return setSpeakFeedback({ type: 'error', text: '您的瀏覽器不支援。請使用 Chrome。' });
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.onstart = () => { setIsRecording(true); setSpeakFeedback(null); };
        recognition.onerror = () => { setIsRecording(false); };
        recognition.onend = () => setIsRecording(false);
        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          const score = transcript.toLowerCase().includes(filteredDB[currentIndex].en.toLowerCase().split(' ')[0]) ? 100 : 50;
          setSpeakFeedback({ type: score === 100 ? 'success' : 'warning', text: `辨識到: "${transcript}"`, score });
        };
        recognition.start();
      };

      // Renders
      if (mode === 'menu') {
        return (
          <div className="flex flex-col items-center justify-center min-h-[75vh] space-y-8">
            <div className="text-center mb-4">
              <h1 className="text-4xl font-extrabold text-gray-800 mb-4">語塊特訓中心</h1>
              <p className="text-gray-500 text-lg">全方位提升英語力</p>
            </div>
            <div className="w-full max-w-md bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
              <label className="block text-gray-700 font-bold mb-3 flex items-center"><Icon name="List" className="mr-2" size={20} /> 選擇練習主題</label>
              <select value={selectedCategory} onChange={(e) => setSelectedCategory(e.target.value)} className="w-full p-3 border-2 border-blue-100 rounded-xl bg-blue-50 text-blue-800 font-medium">
                <option value="All">🌈 全部主題綜合練習</option>
                {allCategories.map((cat, idx) => <option key={idx} value={cat}>{cat}</option>)}
              </select>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
              <button onClick={() => setMode('flashcard')} className="flex items-center p-6 bg-white border-2 border-gray-100 rounded-2xl shadow-sm hover:border-blue-400">
                <div className="p-4 bg-blue-50 text-blue-600 rounded-full"><Icon name="BrainCircuit" size={28} /></div>
                <div className="ml-4 text-left"><h2 className="text-xl font-bold">智慧記憶卡片</h2></div>
              </button>
              <button onClick={() => setMode('spelling')} className="flex items-center p-6 bg-white border-2 border-gray-100 rounded-2xl shadow-sm hover:border-green-400">
                <div className="p-4 bg-green-50 text-green-600 rounded-full"><Icon name="Edit3" size={28} /></div>
                <div className="ml-4 text-left"><h2 className="text-xl font-bold">拼寫練習</h2></div>
              </button>
              <button onClick={() => setMode('listening')} className="flex items-center p-6 bg-white border-2 border-gray-100 rounded-2xl shadow-sm hover:border-purple-400">
                <div className="p-4 bg-purple-50 text-purple-600 rounded-full"><Icon name="Headphones" size={28} /></div>
                <div className="ml-4 text-left"><h2 className="text-xl font-bold">盲聽測驗</h2></div>
              </button>
              <button onClick={() => setMode('speaking')} className="flex items-center p-6 bg-white border-2 border-gray-100 rounded-2xl shadow-sm hover:border-orange-400">
                <div className="p-4 bg-orange-50 text-orange-600 rounded-full"><Icon name="MessageCircle" size={28} /></div>
                <div className="ml-4 text-left"><h2 className="text-xl font-bold">口說評分</h2></div>
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto pt-4">
          <div className="flex items-center justify-between mb-8">
            <button onClick={() => setMode('menu')} className="px-5 py-2 bg-white text-gray-700 rounded-lg shadow-sm border border-gray-200 flex items-center">
              <Icon name="ArrowLeft" size={18} className="mr-2" /> 返回
            </button>
          </div>

          {mode === 'flashcard' && (
             fcQueue.length === 0 ? (
               <div className="text-center p-8 bg-white rounded-3xl"><h2 className="text-2xl font-bold">完成！</h2><button onClick={() => setMode('menu')} className="mt-4 p-4 bg-blue-600 text-white rounded-xl">回主選單</button></div>
             ) : (
              <div className="w-full max-w-xl mx-auto text-center">
                <div className="mb-4 text-gray-500">剩下卡片: {fcQueue.length} / {fcTotalCards}</div>
                <div onClick={handleFlashcardFlip} className="min-h-[300px] bg-white rounded-3xl shadow p-8 cursor-pointer flex flex-col justify-center items-center">
                  {isFlipped ? (
                    <div>
                      <h2 className="text-2xl font-bold mb-4">{fcQueue[0].zh}</h2>
                      <p className="text-blue-600 italic">"{currentExample.text}"</p>
                      <p className="text-gray-500 text-sm mt-2">{currentExample.translation}</p>
                    </div>
                  ) : <h2 className="text-4xl font-extrabold text-blue-600">{fcQueue[0].en}</h2>}
                </div>
                {isFlipped && (
                  <div className="flex space-x-2 mt-4">
                    <button onClick={(e) => handleSrsClick(e, 'again')} className="flex-1 p-3 bg-red-50 text-red-600 rounded-xl font-bold">Again</button>
                    <button onClick={(e) => handleSrsClick(e, 'hard')} className="flex-1 p-3 bg-orange-50 text-orange-600 rounded-xl font-bold">Hard</button>
                    <button onClick={(e) => handleSrsClick(e, 'good')} className="flex-1 p-3 bg-blue-50 text-blue-600 rounded-xl font-bold">Good</button>
                    <button onClick={(e) => handleSrsClick(e, 'easy')} className="flex-1 p-3 bg-green-50 text-green-600 rounded-xl font-bold">Easy</button>
                  </div>
                )}
              </div>
             )
          )}

          {mode === 'listening' && (
            showListenSummary ? (
              <div className="text-center p-8 bg-white rounded-3xl">
                <h2 className="text-3xl font-bold mb-4">測驗結束</h2>
                <button onClick={listenWrongQueue.length === 0 ? () => setMode('menu') : startNextListenRound} className="p-4 bg-blue-600 text-white rounded-xl">
                  {listenWrongQueue.length === 0 ? '回主選單' : `挑戰錯誤 (${listenWrongQueue.length}題)`}
                </button>
              </div>
            ) : (
              <div className="w-full max-w-xl mx-auto bg-white rounded-3xl p-8 text-center">
                <button onClick={() => playAudio(listenQueue[listenIndex].en)} className="mx-auto w-24 h-24 bg-purple-50 rounded-full flex items-center justify-center mb-8"><Icon name="PlayCircle" size={48} className="text-purple-600" /></button>
                <div className="space-y-3">
                  {listeningOptions.map((opt, idx) => (
                    <button key={idx} onClick={() => handleListenSelect(opt.zh)} className="w-full p-4 border rounded-xl hover:bg-gray-50">{opt.zh}</button>
                  ))}
                </div>
                {listenFeedback && <button onClick={handleListenNext} className="mt-4 p-3 bg-gray-100 w-full rounded-xl">下一題</button>}
              </div>
            )
          )}

          {mode === 'spelling' && (
            <div className="max-w-xl mx-auto bg-white p-8 rounded-3xl text-center">
              <h2 className="text-2xl font-bold mb-6">{filteredDB[currentIndex]?.zh}</h2>
              <input type="text" value={userInput} onChange={e => setUserInput(e.target.value)} className="w-full p-4 border rounded-xl mb-4 text-center" />
              <button onClick={checkSpelling} className="w-full p-4 bg-green-500 text-white rounded-xl">檢查</button>
              {spellFeedback && <div className="mt-4 font-bold">{spellFeedback.text}</div>}
              <div className="flex space-x-4 mt-8"><button onClick={prevWord} className="flex-1 p-3 bg-gray-100 rounded-xl">上一題</button><button onClick={nextWord} className="flex-1 p-3 bg-gray-100 rounded-xl">下一題</button></div>
            </div>
          )}

          {mode === 'speaking' && (
            <div className="max-w-xl mx-auto bg-white p-8 rounded-3xl text-center">
              <h2 className="text-2xl font-bold mb-2">{filteredDB[currentIndex]?.zh}</h2>
              <h3 className="text-xl text-blue-600 mb-8">{filteredDB[currentIndex]?.en}</h3>
              <button onClick={handleSpeak} className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto text-white ${isRecording ? 'bg-red-500' : 'bg-orange-500'}`}><Icon name="Mic" size={48} /></button>
              {speakFeedback && <div className="mt-4 font-bold">{speakFeedback.text}</div>}
              <div className="flex space-x-4 mt-8"><button onClick={prevWord} className="flex-1 p-3 bg-gray-100 rounded-xl">上一題</button><button onClick={nextWord} className="flex-1 p-3 bg-gray-100 rounded-xl">下一題</button></div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
